resolver 127.0.0.11 ipv6=off valid=5s;

server {
    listen 80;
    server_name _;

    # API v1 routes (keep /api/v1 prefix) - proxy to backend without stripping
    location /api/v1/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes (with /api prefix) - strips /api/ prefix
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes (direct, no prefix) - proxy to backend
    location ~ ^/(auth|companies|jobs|candidates|matches|interviews|docs|openapi.json|redoc) {
        set $upstream http://api:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health
    location /health {
        set $upstream http://api:8000/health;
        proxy_pass $upstream;
    }

    # Static files and Next.js frontend
    location / {
        set $upstream http://web:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Error log
    access_log /dev/stdout;
    error_log /dev/stderr info;
}
