name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check apps/api/ services/ --exit-zero

  deploy:
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        timeout-minutes: 10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            DIR="/root/whyme/whymeapp"

            if [ ! -d "$DIR" ]; then
              echo "ERRO: Diretório $DIR não existe no servidor."
              echo "Clone o repositório primeiro:"
              echo "  git clone https://github.com/fonsecastabenow/Whymeapp.git $DIR"
              exit 1
            fi

            cd "$DIR"
            echo "➡️ Atualizando código..."
            git pull origin main

            echo "➡️ Rebuildando e subindo containers..."
            docker compose up -d --build

            echo "➡️ Limpando imagens antigas..."
            docker system prune -f

            echo "✅ Deploy concluído com sucesso!"
