services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whyme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whyme}
      POSTGRES_DB: ${POSTGRES_DB:-whyme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whyme}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-whyme}:${POSTGRES_PASSWORD:-whyme}@postgres:5432/${POSTGRES_DB:-whyme}
      REDIS_URL: redis://redis:6379
      API_SECRET_KEY: ${API_SECRET_KEY:-whyme-dev-secret-key-change-in-production}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-whyme-resumes}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  celery-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-whyme}:${POSTGRES_PASSWORD:-whyme}@postgres:5432/${POSTGRES_DB:-whyme}
      REDIS_URL: redis://redis:6379
      API_SECRET_KEY: ${API_SECRET_KEY:-whyme-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    restart: unless-stopped

  ml-service:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      ML_SERVICE_PORT: 8001
    volumes:
      - ./services/ml:/app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
