services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whyme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whyme}
      POSTGRES_DB: ${POSTGRES_DB:-whyme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whyme}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-whyme}:${POSTGRES_PASSWORD:-whyme}@postgres:5432/${POSTGRES_DB:-whyme}
      REDIS_URL: redis://redis:6379
      API_SECRET_KEY: ${API_SECRET_KEY:-whyme-dev-secret-key-change-in-production}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-whyme-resumes}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://whymeapp.io
    environment:
      API_URL: http://api:8000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://whymeapp.io}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-whyme-dev-secret}
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docs:/usr/share/nginx/html/docs:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

  celery-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: celery -A app.tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-whyme}:${POSTGRES_PASSWORD:-whyme}@postgres:5432/${POSTGRES_DB:-whyme}
      REDIS_URL: redis://redis:6379
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
