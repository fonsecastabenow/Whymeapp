<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${subject}</title>
</head>
<body style="margin:0;padding:0;background-color:#09090b;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#09090b;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="padding-bottom:32px;text-align:center;">
              <span style="font-size:24px;font-weight:700;color:#ffffff;letter-spacing:-0.5px;">
                Why<span style="color:#3b82f6;">Me</span>
              </span>
            </td>
          </tr>

          <!-- Content card -->
          <tr>
            <td style="background-color:#18181b;border-radius:12px;border:1px solid #27272a;padding:40px 32px;">
              ${content}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top:32px;text-align:center;">
              <p style="margin:0 0 8px;font-size:13px;color:#71717a;">
                Você está recebendo este email porque tem uma conta no Whyme.
              </p>
              <p style="margin:0;font-size:13px;color:#52525b;">
                <a href="https://whymeapp.io/settings/notifications" style="color:#52525b;text-decoration:underline;">
                  Cancelar inscrição de notificações por email
                </a>
                &nbsp;·&nbsp;
                <a href="https://whymeapp.io" style="color:#52525b;text-decoration:none;">
                  whymeapp.io
                </a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
